<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agente Outliers</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: #2a2a3a;
    --accent: #c8f04a;
    --accent2: #8b5cf6;
    --text: #e8e8f0;
    --text-muted: #7070a0;
    --bot-bubble: #1c1c27;
    --user-bubble: #1e1e30;
    --radius: 18px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow: hidden;
  }

  .bg-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.12;
    pointer-events: none;
    z-index: 0;
  }
  .orb1 { width: 500px; height: 500px; background: var(--accent); top: -100px; right: -100px; }
  .orb2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; left: -100px; }

  .chat-wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 520px;
    height: 90vh;
    max-height: 780px;
    display: flex;
    flex-direction: column;
    border: 1px solid var(--border);
    border-radius: 24px;
    background: var(--surface);
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(200,240,74,0.05);
  }

  /* Header */
  .chat-header {
    padding: 20px 24px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }
  .avatar {
    width: 44px; height: 44px;
    border-radius: 14px;
    overflow: hidden;
    flex-shrink: 0;
    border: 2px solid var(--accent);
  }
  .avatar img {
    width: 100%; height: 100%; object-fit: cover; object-position: right center;
  }
  .header-info h2 {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .header-info p {
    font-size: 12px;
    color: var(--accent);
    font-weight: 500;
    margin-top: 1px;
  }
  .status-dot {
    width: 7px; height: 7px;
    background: var(--accent);
    border-radius: 50%;
    margin-left: auto;
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Messages */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .message {
    display: flex;
    gap: 10px;
    max-width: 90%;
    animation: fadeUp 0.3s ease forwards;
    opacity: 0;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.bot { align-self: flex-start; }
  .message.user { align-self: flex-end; flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 10px;
    overflow: hidden;
    flex-shrink: 0;
    margin-top: 2px;
    border: 1.5px solid var(--accent);
  }
  .msg-avatar img {
    width: 100%; height: 100%; object-fit: cover; object-position: right center;
  }

  .bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14.5px;
    line-height: 1.6;
    max-width: 100%;
  }
  .message.bot .bubble {
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }
  .message.user .bubble {
    background: linear-gradient(135deg, var(--accent2), #7c3aed);
    border-bottom-right-radius: 4px;
    color: #fff;
  }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    gap: 5px;
    padding: 14px 16px;
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    border-bottom-left-radius: 4px;
    width: fit-content;
  }
  .typing-dot {
    width: 7px; height: 7px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* Quick replies */
  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 20px 12px;
    flex-shrink: 0;
  }
  .quick-btn {
    padding: 8px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    color: var(--text);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }
  .quick-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(200,240,74,0.05);
  }

  /* Input */
  .chat-input {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    flex-shrink: 0;
    background: var(--surface2);
  }
  .chat-input input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .chat-input input::placeholder { color: var(--text-muted); }
  .chat-input input:focus { border-color: var(--accent); }
  .send-btn {
    width: 46px; height: 46px;
    background: var(--accent);
    border: none;
    border-radius: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: #d4f557; transform: scale(1.05); }
  .send-btn:active { transform: scale(0.97); }
  .send-btn svg { width: 20px; height: 20px; }

  /* Lead card */
  .lead-card {
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: 16px;
    padding: 16px;
    margin-top: 4px;
  }
  .lead-card h4 {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }
  .lead-card p { font-size: 13.5px; color: var(--text); margin-bottom: 4px; }
  .lead-card span { color: var(--text-muted); font-size: 12px; }
  .copy-btn {
    margin-top: 12px;
    padding: 8px 16px;
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
  }
  .copy-btn:hover { background: #d4f557; }

  .disclaimer {
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    padding: 8px 20px 14px;
    flex-shrink: 0;
  }
</style>
</head>

      <p>Consultora de treinamentos</p>
    </div>
    <div class="status-dot"></div>
  </div>

  <div class="chat-messages" id="messages"></div>

  <div class="quick-replies" id="quickReplies"></div>

  <div class="chat-input">
    <input type="text" id="userInput" placeholder="Digite sua mensagem..." autocomplete="off" />
    <button class="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0a0a0f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <div class="disclaimer">Agente de IA · Outliers Treinamentos</div>
</div>

<script>
const TREINAMENTO_PRINCIPAL = "Imersão Paradigma";
const TREINAMENTOS_EXCLUSIVOS = [
  "PQV - O Pensamento que faz vender",
  "Método Cash",
  "Outliers",
  "Mentoria Lucas Labastie",
  "MentoCash VendasNow"
];

// ── CONFIGURAÇÃO ─────────────────────────────────────────────────
// Substitua pela URL do seu projeto Supabase
// Formato: https://SEU_PROJETO.supabase.co/functions/v1/captar-lead
const CRM_URL = "https://SEU_PROJETO.supabase.co/functions/v1/captar-lead"

// Chave anônima do Supabase (pode ficar aqui — é pública)
const SUPABASE_ANON_KEY = "SUA_ANON_KEY_AQUI"

// Substitua pela URL do seu servidor/proxy que chama a API da Anthropic
// Exemplo se publicar na Vercel com uma rota /api/chat:
const ANTHROPIC_PROXY_URL = "/api/chat"

const SYSTEM_PROMPT = `Você é a assistente virtual da Outliers Treinamentos, uma empresa especializada em treinamentos de alta performance e vendas. Seu nome é Andréia.

Contexto importante:
- O único treinamento disponível para novos alunos é a **Imersão Paradigma**. É sempre o primeiro passo.
- Os outros treinamentos (PQV, Método Cash, Outliers, Mentoria Lucas Labastie, MentoCash VendasNow) são EXCLUSIVOS para quem já comprou o programa Outliers durante a Imersão Paradigma. Não ofereça esses outros treinamentos para quem ainda não participou da Imersão.
- Se alguém perguntar sobre os outros treinamentos, explique com entusiasmo que eles são exclusivos para alunos que participam da Imersão Paradigma e que é por isso que a Imersão é o caminho certo para começar.

Sobre você:
- Seu nome é Andréia e você faz parte da equipe do Lucas Labastie, o treinador da Imersão Paradigma
- Nunca se apresente como "consultora virtual" ou "assistente virtual" — apenas diga que é a Andréia, da equipe do Lucas Labastie
- Converse de forma humana, calorosa e natural, como uma pessoa real da equipe

Seu objetivo é:
1. Recepcionar o visitante com calor e entusiasmo
2. Responder dúvidas sobre a Imersão Paradigma
3. Coletar os dados do interessado: nome completo, e-mail e telefone (WhatsApp)
4. Quando tiver os três dados coletados, confirme com a pessoa e inclua no final da sua resposta exatamente este bloco (sem nada após ele):
   DADOS_LEAD:{"nome":"...","email":"...","telefone":"...","treinamento":"Imersão Paradigma"}

Regras importantes:
- Converse SEMPRE em português do Brasil, de forma calorosa, humana e motivadora
- Não invente detalhes sobre a Imersão que não foram fornecidos — se não souber algo específico, diga que vai verificar e retorna com a pessoa
- Colete os dados de forma natural durante a conversa, não como um formulário frio
- Seja entusiasmada — a Imersão Paradigma transforma vidas!
- Mantenha respostas curtas e objetivas (máximo 3 parágrafos)`;

let conversationHistory = [];
let leadData = { nome: null, email: null, telefone: null, treinamento: null };
let leadCaptured = false;

const messagesEl = document.getElementById('messages');
const quickRepliesEl = document.getElementById('quickReplies');
const inputEl = document.getElementById('userInput');

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addMessage(text, role, extra = null) {
  const wrapper = document.createElement('div');
  wrapper.className = `message ${role}`;

  if (role === 'bot') {
    const av = document.createElement('div');
    av.className = 'msg-avatar';
    av.textContent = '🎯';
    wrapper.appendChild(av);
  }

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  // Clean text from DADOS_LEAD tag
  const cleanText = text.replace(/DADOS_LEAD:\{.*\}/s, '').trim();
  bubble.innerHTML = cleanText.replace(/\n/g, '<br>');

  if (extra) bubble.appendChild(extra);
  wrapper.appendChild(bubble);
  messagesEl.appendChild(wrapper);
  scrollToBottom();
}

function showTyping() {
  const wrapper = document.createElement('div');
  wrapper.className = 'message bot';
  wrapper.id = 'typing';

  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.textContent = '🎯';
  wrapper.appendChild(av);

  const ind = document.createElement('div');
  ind.className = 'typing-indicator';
  ind.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  wrapper.appendChild(ind);

  messagesEl.appendChild(wrapper);
  scrollToBottom();
}

function hideTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function setQuickReplies(options) {
  quickRepliesEl.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quick-btn';
    btn.textContent = opt;
    btn.onclick = () => {
      inputEl.value = opt;
      sendMessage();
    };
    quickRepliesEl.appendChild(btn);
  });
}

function buildLeadCard(data) {
  const card = document.createElement('div');
  card.className = 'lead-card';
  card.innerHTML = `
    <h4>✅ Lead Capturado</h4>
    <p>👤 <strong>${data.nome}</strong></p>
    <p>📧 ${data.email}</p>
    <p>📱 ${data.telefone}</p>
    <p>🎓 ${data.treinamento}</p>
  `;
  const btn = document.createElement('button');
  btn.className = 'copy-btn';
  btn.textContent = 'Copiar dados';
  btn.onclick = () => {
    const txt = `Nome: ${data.nome}\nEmail: ${data.email}\nTelefone: ${data.telefone}\nTreinamento: ${data.treinamento}`;
    navigator.clipboard.writeText(txt).then(() => {
      btn.textContent = '✓ Copiado!';
      setTimeout(() => btn.textContent = 'Copiar dados', 2000);
    });
  };
  card.appendChild(btn);
  return card;
}

async function sendToCRM(data) {
  try {
    const res = await fetch(CRM_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'apikey': SUPABASE_ANON_KEY
      },
      body: JSON.stringify(data)
    });
    if (res.ok) {
      console.log('✅ Lead enviado ao CRM com sucesso!');
    } else {
      console.warn('⚠️ CRM retornou erro:', res.status);
    }
    return res.ok;
  } catch (err) {
    console.warn('⚠️ Falha ao enviar ao CRM (será tentado depois):', err.message);
    return false;
  }
}

function extractLeadData(text) {
  const match = text.match(/DADOS_LEAD:(\{.*?\})/s);
  if (match) {
    try { return JSON.parse(match[1]); } catch { return null; }
  }
  return null;
}

async function callClaude(userMessage) {
  conversationHistory.push({ role: 'user', content: userMessage });

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: SYSTEM_PROMPT,
      messages: conversationHistory
    })
  });

  const data = await response.json();
  const reply = data.content?.[0]?.text || 'Desculpe, tive um problema. Pode repetir?';

  conversationHistory.push({ role: 'assistant', content: reply });
  return reply;
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  inputEl.value = '';
  quickRepliesEl.innerHTML = '';
  addMessage(text, 'user');
  showTyping();

  try {
    const reply = await callClaude(text);
    hideTyping();

    // Check for lead data
    const extracted = extractLeadData(reply);
    let card = null;

    if (extracted && !leadCaptured) {
      leadCaptured = true;
      leadData = extracted;
      card = buildLeadCard(leadData);
      sendToCRM(leadData); // envia ao CRM em background
    }

    addMessage(reply, 'bot', card);

    // Sugerir opções iniciais se ainda não captou lead
    if (!leadCaptured && conversationHistory.length <= 3) {
      setQuickReplies(["O que é a Imersão Paradigma?", "Quando acontece?", "Qual o investimento?", "Quero me inscrever!"]);
    }

  } catch (err) {
    hideTyping();
    addMessage('Ops! Tive um problema técnico. Tente novamente em instantes. 🙏', 'bot');
  }
}

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMessage();
});

// Mensagem inicial
async function init() {
  showTyping();
  await new Promise(r => setTimeout(r, 1200));
  hideTyping();
  const welcome = `Olá! Tudo bem? Aqui é a Andréia, da equipe do Lucas Labastie! 😊\n\nFico feliz que você chegou até aqui! Estou à disposição para te contar tudo sobre a **Imersão Paradigma** e tirar qualquer dúvida que você tiver.\n\nComo posso te ajudar?`;
  addMessage(welcome, 'bot');
  conversationHistory.push({ role: 'assistant', content: welcome });
  setQuickReplies(["O que é a Imersão Paradigma?", "Quando acontece?", "Qual o investimento?", "Quero me inscrever!"]);
}

init();
</script>
</body>
</html>
